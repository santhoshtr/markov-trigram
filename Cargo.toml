[package]
name = "markov-trigram"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ml_tokenizer"
path = "src/ml_tokenizer.rs"

[dependencies]
anyhow = "1.0.100"
rkyv = { version = "0.8.12", features = [] }
rayon = "1.11.0"
serde = {version="1.0.228", features=["derive"]}
rand = "0.9.2"
clap = { version = "4.4", features = ["derive"] }
tokenizers = "0.22.2"
tempfile = "3.24.0"
